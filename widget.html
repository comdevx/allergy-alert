<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Allergy Alert Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #1f7a8c;
      --accent-ink: #ffffff;
      --bg: #ffffff;
      --card-bg: #f5f7f8;
      --text: #1a1a1a;
      --text-muted: #5a6872;
      --border: #e0e4e7;
      --risk-low: #2f8f5b;
      --risk-med: #d9a50f;
      --risk-high: #e07b12;
      --risk-vhigh: #cf3b2e;
      --font: "Noto Sans Thai", system-ui, -apple-system, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --accent: #4fa9bc;
        --accent-ink: #08171c;
        --bg: #0f1c20;
        --card-bg: #162529;
        --text: #e8ecee;
        --text-muted: #8fa3ad;
        --border: #2a3d44;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
      min-height: 100%;
    }

    .widget {
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 180px;
      max-height: 240px;
    }

    /* Header */
    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--accent);
      color: var(--accent-ink);
      padding: 6px 10px;
      flex-shrink: 0;
    }

    .widget-header .brand {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
      font-size: 12px;
    }

    .widget-header .brand svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .widget-header a {
      color: var(--accent-ink);
      text-decoration: none;
      font-size: 11px;
      opacity: 0.85;
      white-space: nowrap;
    }

    .widget-header a:hover {
      opacity: 1;
      text-decoration: underline;
    }

    /* Content */
    .widget-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 12px;
      gap: 8px;
    }

    /* Risk row */
    .risk-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .risk-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }

    .risk-badge.low { background: var(--risk-low); }
    .risk-badge.med { background: var(--risk-med); color: #1a1a1a; }
    .risk-badge.high { background: var(--risk-high); }
    .risk-badge.vhigh { background: var(--risk-vhigh); }

    .location-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 6px;
    }

    .stat-cell {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 6px;
      text-align: center;
    }

    .stat-cell .stat-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-cell .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* Advice */
    .advice {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* States */
    .state-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      font-size: 13px;
      color: var(--text-muted);
    }

    .state-msg.error {
      color: var(--risk-vhigh);
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="widget-header">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a5 5 0 0 1 5 5c0 2-1 3-2 4l-1 1v2h-4v-2l-1-1c-1-1-2-2-2-4a5 5 0 0 1 5-5z"/>
          <path d="M10 18h4"/>
          <path d="M10 21h4"/>
        </svg>
        <span>Allergy Alert</span>
      </div>
      <a href="https://comdevx.github.io/allergy-alert/" target="_blank" rel="noopener">ดูเพิ่มเติม &rarr;</a>
    </div>
    <div id="content">
      <div class="state-msg" id="loading">กำลังโหลด...</div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // --- Province lookup ---
      var PROVINCES = {
        'bangkok': { nameTh: 'กรุงเทพมหานคร', lat: 13.75, lon: 100.52 },
        'chiang mai': { nameTh: 'เชียงใหม่', lat: 18.79, lon: 98.98 },
        'phuket': { nameTh: 'ภูเก็ต', lat: 7.88, lon: 98.39 },
        'khon kaen': { nameTh: 'ขอนแก่น', lat: 16.43, lon: 102.83 },
        'nakhon ratchasima': { nameTh: 'นครราชสีมา', lat: 14.97, lon: 102.10 },
        'chiang rai': { nameTh: 'เชียงราย', lat: 19.91, lon: 99.83 },
        'songkhla': { nameTh: 'สงขลา', lat: 7.19, lon: 100.59 },
        'udon thani': { nameTh: 'อุดรธานี', lat: 17.42, lon: 102.79 },
        'nonthaburi': { nameTh: 'นนทบุรี', lat: 13.86, lon: 100.51 },
        'pathum thani': { nameTh: 'ปทุมธานี', lat: 14.02, lon: 100.53 }
      };

      var DEFAULT = PROVINCES['bangkok'];

      // --- Parse URL params ---
      function getParams() {
        var params = new URLSearchParams(window.location.search);
        var area = params.get('area');
        var lat = parseFloat(params.get('lat'));
        var lon = parseFloat(params.get('lon'));

        if (isFinite(lat) && isFinite(lon)) {
          var name = area || 'Custom';
          return { lat: lat, lon: lon, name: name, nameTh: name };
        }

        if (area) {
          var key = area.toLowerCase().trim();
          var match = PROVINCES[key];
          if (match) {
            return { lat: match.lat, lon: match.lon, name: area, nameTh: match.nameTh };
          }
        }

        return { lat: DEFAULT.lat, lon: DEFAULT.lon, name: 'Bangkok', nameTh: DEFAULT.nameTh };
      }

      // --- Scoring functions (inlined from risk.js) ---
      function isNum(v) {
        return typeof v === 'number' && isFinite(v);
      }

      function nums(arr) {
        return (arr || []).filter(isNum);
      }

      function maxOf(arr) {
        var v = nums(arr);
        return v.length ? Math.max.apply(null, v) : null;
      }

      function scoreTemp(deltaC) {
        if (!isNum(deltaC)) return null;
        if (deltaC < 4) return 0;
        if (deltaC < 7) return 1;
        if (deltaC < 10) return 2;
        return 3;
      }

      function scoreHumidity(rh) {
        if (!isNum(rh)) return null;
        if (rh < 20) return 3;
        if (rh < 30) return 2;
        if (rh < 40) return 1;
        if (rh <= 70) return 0;
        if (rh <= 80) return 1;
        if (rh <= 90) return 2;
        return 3;
      }

      function scoreAir(pm25, pm10) {
        var s25 = isNum(pm25)
          ? (pm25 <= 15 ? 0 : pm25 <= 37.5 ? 1 : pm25 <= 75 ? 2 : 3)
          : null;
        var s10 = isNum(pm10)
          ? (pm10 <= 50 ? 0 : pm10 <= 80 ? 1 : pm10 <= 120 ? 2 : 3)
          : null;
        if (s25 === null && s10 === null) return null;
        if (s25 === null) return s10;
        if (s10 === null) return s25;
        return Math.max(s25, s10);
      }

      function scorePollen(values) {
        var max = maxOf(values);
        if (max === null) return null;
        if (max <= 20) return 0;
        if (max <= 80) return 1;
        if (max <= 200) return 2;
        return 3;
      }

      var WEIGHTS = { temp: 1.5, air: 1.5, humidity: 1.0, pollen: 1.0 };
      var MAX_POINTS = 3;

      function combine(factors) {
        var sum = 0;
        var denom = 0;
        var hasMax = false;
        var keys = Object.keys(WEIGHTS);
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          var points = factors[key];
          if (!isNum(points)) continue;
          sum += points * WEIGHTS[key];
          denom += MAX_POINTS * WEIGHTS[key];
          if (points === MAX_POINTS) hasMax = true;
        }
        if (denom === 0) return { level: 'low', pct: 0, factors: factors };
        var pct = sum / denom;
        var level = pct < 0.25 ? 'low' : pct < 0.5 ? 'med' : pct < 0.75 ? 'high' : 'vhigh';
        if (hasMax && (level === 'low' || level === 'med')) level = 'high';
        return { level: level, pct: pct, factors: factors };
      }

      function computeTempDelta(temps, idxNow) {
        if (!Array.isArray(temps) || !isNum(idxNow) || idxNow < 0 || idxNow >= temps.length) return null;
        var start = Math.max(0, idxNow - 24);
        var windowVals = nums(temps.slice(start, idxNow + 1));
        var swing = windowVals.length >= 2 ? Math.max.apply(null, windowVals) - Math.min.apply(null, windowVals) : null;
        var nowT = temps[idxNow];
        var prevT = idxNow >= 24 ? temps[idxNow - 24] : undefined;
        var dayDiff = isNum(nowT) && isNum(prevT) ? Math.abs(nowT - prevT) : null;
        if (swing === null && dayDiff === null) return null;
        if (swing === null) return dayDiff;
        if (dayDiff === null) return swing;
        return Math.max(swing, dayDiff);
      }

      function findIdxNow(times) {
        if (!Array.isArray(times)) return -1;
        var now = new Date();
        var pad = function(n) { return String(n).padStart(2, '0'); };
        var key = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) + 'T' + pad(now.getHours()) + ':00';
        return times.indexOf(key);
      }

      // --- Advice text ---
      var ADVICE = {
        low: 'สภาพอากาศดี — ใช้ชีวิตได้ตามปกติ',
        med: 'ควรพกยาแก้แพ้ สังเกตอาการเริ่มต้น',
        high: '💊 ควรพกยาแก้แพ้ สวมหน้ากากเมื่อออกนอกบ้าน',
        vhigh: '⚠️ หลีกเลี่ยงออกนอกบ้าน สวมหน้ากาก N95'
      };

      var LEVEL_LABELS = {
        low: 'ต่ำ',
        med: 'ปานกลาง',
        high: 'สูง',
        vhigh: 'สูงมาก'
      };

      // --- Render ---
      function render(data) {
        var content = document.getElementById('content');
        content.innerHTML =
          '<div class="widget-content">' +
            '<div class="risk-row">' +
              '<span class="risk-badge ' + data.level + '">' + LEVEL_LABELS[data.level] + '</span>' +
              '<span class="location-name">' + escHtml(data.locationName) + '</span>' +
            '</div>' +
            '<div class="stats-row">' +
              '<div class="stat-cell"><div class="stat-value">' + data.tempDelta + '</div><div class="stat-label">อุณหภูมิผันผวน</div></div>' +
              '<div class="stat-cell"><div class="stat-value">' + data.humidity + '</div><div class="stat-label">ความชื้น</div></div>' +
              '<div class="stat-cell"><div class="stat-value">' + data.pm25 + '</div><div class="stat-label">PM2.5</div></div>' +
            '</div>' +
            '<div class="advice">' + ADVICE[data.level] + '</div>' +
          '</div>';
      }

      function showError() {
        var content = document.getElementById('content');
        content.innerHTML = '<div class="state-msg error">ไม่สามารถโหลดข้อมูลได้</div>';
      }

      function escHtml(s) {
        var d = document.createElement('span');
        d.textContent = s;
        return d.innerHTML;
      }

      // --- Main ---
      function main() {
        var loc = getParams();
        var weatherUrl = 'https://api.open-meteo.com/v1/forecast?latitude=' + loc.lat + '&longitude=' + loc.lon +
          '&current=temperature_2m,relative_humidity_2m&hourly=temperature_2m,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min&past_days=2&forecast_days=7&timezone=auto';
        var airUrl = 'https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + loc.lat + '&longitude=' + loc.lon +
          '&current=pm2_5,pm10&hourly=pm2_5,pm10,grass_pollen,birch_pollen,ragweed_pollen,mugwort_pollen,olive_pollen,alder_pollen&forecast_days=7&timezone=auto';

        Promise.all([
          fetch(weatherUrl).then(function(r) { return r.json(); }),
          fetch(airUrl).then(function(r) { return r.json(); })
        ]).then(function(results) {
          var weather = results[0];
          var air = results[1];

          // Compute temp delta
          var temps = weather.hourly && weather.hourly.temperature_2m;
          var times = weather.hourly && weather.hourly.time;
          var idxNow = findIdxNow(times);
          var tempDelta = computeTempDelta(temps, idxNow);

          // Current humidity
          var humidity = weather.current && weather.current.relative_humidity_2m;

          // Current PM2.5 and PM10
          var pm25 = air.current && air.current.pm2_5;
          var pm10 = air.current && air.current.pm10;

          // Pollen (current hour from hourly data)
          var airTimes = air.hourly && air.hourly.time;
          var airIdxNow = findIdxNow(airTimes);
          var pollenValues = [];
          var pollenKeys = ['grass_pollen', 'birch_pollen', 'ragweed_pollen', 'mugwort_pollen', 'olive_pollen', 'alder_pollen'];
          if (airIdxNow >= 0 && air.hourly) {
            for (var i = 0; i < pollenKeys.length; i++) {
              var arr = air.hourly[pollenKeys[i]];
              if (arr && isNum(arr[airIdxNow])) {
                pollenValues.push(arr[airIdxNow]);
              }
            }
          }

          // Compute risk
          var factors = {
            temp: scoreTemp(tempDelta),
            humidity: scoreHumidity(humidity),
            air: scoreAir(pm25, pm10),
            pollen: scorePollen(pollenValues)
          };
          var result = combine(factors);

          render({
            level: result.level,
            locationName: loc.nameTh,
            tempDelta: isNum(tempDelta) ? tempDelta.toFixed(1) + '°C' : '-',
            humidity: isNum(humidity) ? Math.round(humidity) + '%' : '-',
            pm25: isNum(pm25) ? Math.round(pm25) : '-'
          });
        }).catch(function() {
          showError();
        });
      }

      main();
    })();
  </script>
</body>
</html>
